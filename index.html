<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eurovision Voting Patterns · Graph Drawing Contest 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="loading">Loading data…</div>

  <div id="app">

    <header id="page-header">
      <h1>Eurovision Voting Patterns</h1>
      <div id="research-questions">
        <button class="rq" id="rq1" type="button">Q1 — Which pairs show <b>persistent support</b> over time?</button>
        <button class="rq" id="rq2" type="button">Q2 — Which relationships <b>changed the most</b>?</button>
        <button class="rq" id="rq3" type="button">Q3 — Where do <b>jury and public diverge</b>?</button>
      </div>
    </header>

    <div id="controls-strip">
      <!-- populated by js/controls.js -->
    </div>

    <div id="views-grid">

      <div id="matrix-wrap" class="view-wrap">
        <div class="view-title">Adjacency Matrix — Q1, Q2, Q3</div>
        <div id="matrix" class="view-container"></div>
      </div>

      <div id="map-wrap" class="view-wrap">
        <div class="view-title">Geographic Map — Q1, Q2</div>
        <div id="map" class="view-container"></div>
      </div>

      <div id="network-wrap" class="view-wrap">
        <div class="view-title">Force Network — Q1, Q2</div>
        <div id="network" class="view-container"></div>
      </div>

      <div id="timeline-wrap" class="view-wrap">
        <div class="view-title">Pair Timeline — Q2, Q3</div>
        <div id="timeline" class="view-container"></div>
      </div>

      <div id="details-panel">
        <div>
          <h3>Legend</h3>
          <div id="legend"></div>
        </div>
        <div>
          <h3>Selection</h3>
          <div id="selection-info">Click a matrix cell or map country to explore.</div>
        </div>
        <div id="insights-section" style="display:none">
          <h3 id="insights-title">Top findings</h3>
          <div id="insights-list"></div>
          <div id="pairs-browser" style="display:none">
            <div class="pb-controls">
              <input id="pb-search" type="search" placeholder="Filter by country">
              <button id="pb-back" type="button" class="btn-mini">Back</button>
            </div>
            <div class="pb-header">
              <span class="pb-col-name">Pair</span>
              <span id="pb-sort-support" class="pb-sort pb-sort-active">Support ▾</span>
              <span id="pb-sort-years" class="pb-sort">Yrs</span>
            </div>
            <div id="pb-rows"></div>
          </div>
        </div>
      </div>

    </div><!-- #views-grid -->
  </div><!-- #app -->

  <!-- D3 v7 and topojson-client must load before the module -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script type="module" src="js/main.js"></script>

</body>
</html>
